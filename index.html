<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Subway Runner Clone</title>
    <link rel="stylesheet" href="style.css">
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
            }
        }
    </script>
</head>
<body>
    <div id="ui-layer">
        <div id="hud" class="hidden">
            <div class="hud-item">Score: <span id="score">0</span></div>
            <div class="hud-item">Coins: <span id="coins">0</span></div>
            <div class="hud-item">Speed: <span id="speed">1.0</span>x</div>
        </div>

        <div id="start-menu" class="screen">
            <h1>Neon Runner</h1>
            <p>Use Arrow Keys or Swipe to Move/Jump/Slide</p>
            <button id="start-btn">Start Game</button>
        </div>

        <div id="game-over-menu" class="screen hidden">
            <h1>Game Over!</h1>
            <p>Final Score: <span id="final-score">0</span></p>
            <button id="restart-btn">Play Again</button>
        </div>
    </div>

    <script type="module" src="main.js"></script>
</body>
</html>
